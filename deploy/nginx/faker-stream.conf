# Put this file in nginx.conf top-level stream context, or include it from stream {}.
# Mock TCP is raw ISO8583 over TCP/TLS, so it must use Nginx stream instead of HTTP location.

server {
    listen 14400;
    proxy_pass 127.0.0.1:15400;
    proxy_connect_timeout 10s;
    proxy_timeout 300s;
}

# Add one server block per extra Faker mock port.
# Example:
#
