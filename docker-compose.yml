services:
  mysql:
    image: mysql:8.0.36
    environment:
      MYSQL_DATABASE: fake_tcp_server
      MYSQL_USER: fake
      MYSQL_PASSWORD: fake
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fake_tcp_server?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: fake
      SPRING_DATASOURCE_PASSWORD: fake
    ports:
      - "18080:18080"
      - "14400:14400"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql-data:
